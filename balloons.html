  .then(r => r.arrayBuffer())
  .then(buf => audioCtx.decodeAudioData(buf))
  .then(decoded => { popBuffer = decoded; });

function playPop() {
  if (!popBuffer) return;
  const source = audioCtx.createBufferSource();
  source.buffer = popBuffer;
  // Randomize pitch slightly
  source.playbackRate.value = 0.9 + Math.random() * 0.2;
  const gain = audioCtx.createGain();
  gain.gain.value = 0.25;
  source.connect(gain);
  gain.connect(audioCtx.destination);
  source.start(0);
}

// Balloons
let balloons = [];
let particles = [];
let score = 0;

function randomBetween(a, b) {
  return a + Math.random() * (b - a);
}

function shadeColor(hex, amt) {
  let r = parseInt(hex.slice(1, 3), 16);
  let g = parseInt(hex.slice(3, 5), 16);
  let b = parseInt(hex.slice(5, 7), 16);
  r = Math.max(0, Math.min(255, r + amt));
  g = Math.max(0, Math.min(255, g + amt));
  b = Math.max(0, Math.min(255, b + amt));
  return `rgb(${r},${g},${b})`;
}

function spawnBalloon() {
  const isRainbow = Math.random() < 0.12;
  const r = isRainbow ? randomBetween(50, 65) : randomBetween(35, 55);
  balloons.push({
    x: randomBetween(r + 10, W() - r - 10),
    y: H() + r + 10,
    r: r,
    color: isRainbow ? null : COLORS[Math.floor(Math.random() * COLORS.length)],
    speed: isRainbow ? randomBetween(0.5, 1.2) : randomBetween(0.8, 2.0),
    wobbleOffset: Math.random() * Math.PI * 2,
    wobbleSpeed: randomBetween(1.5, 3),
    wobbleAmount: randomBetween(15, 30),
    rainbow: isRainbow,
    hp: isRainbow ? 5 : 1,
    hitFlash: 0,
  });
}

// Particles for pop effect
function spawnParticles(x, y, color) {
  for (let i = 0; i < 12; i++) {
    const angle = (Math.PI * 2 * i) / 12;
    const speed = randomBetween(2, 6);
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      r: randomBetween(4, 9),
      color,
      life: 1.0,
    });
  }
}

// Star burst for extra fun — supports outline mode
function drawStar(cx, cy, size, color, alpha, outline) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    const angle = (Math.PI * 2 * i) / 5 - Math.PI / 2;
    const outerX = cx + Math.cos(angle) * size;
    const outerY = cy + Math.sin(angle) * size;
    const innerAngle = angle + Math.PI / 5;
    const innerX = cx + Math.cos(innerAngle) * size * 0.4;
    const innerY = cy + Math.sin(innerAngle) * size * 0.4;
    if (i === 0) ctx.moveTo(outerX, outerY);
    else ctx.lineTo(outerX, outerY);
    ctx.lineTo(innerX, innerY);
  }
  ctx.closePath();
  if (outline) {
    ctx.strokeStyle = color;
    ctx.lineWidth = 3;
    ctx.lineJoin = 'round';
    ctx.stroke();
  } else {
    ctx.fillStyle = color;
    ctx.fill();
  }
  ctx.restore();
}

// Handle tap / click
function handleTap(px, py) {
  // Resume audio context on first interaction (browser policy)
  if (audioCtx.state === 'suspended') audioCtx.resume();

  // Check balloons in reverse (topmost first)
  for (let i = balloons.length - 1; i >= 0; i--) {
    const b = balloons[i];
    const dx = px - b.x;
    const dy = py - b.y;
    if (dx * dx + dy * dy <= b.r * b.r * 1.3) {
      b.hp--;
      if (b.hp <= 0) {
        playPop();
        // Popped!
        const popColor = b.rainbow ? '#FFD700' : b.color;
        spawnParticles(b.x, b.y, popColor);
        if (b.rainbow) {
          // Extra burst for rainbow balloons
          spawnParticles(b.x, b.y, '#FF4136');
          spawnParticles(b.x, b.y, '#0074D9');
          score += 5;
        } else {
          score++;
        }
        balloons.splice(i, 1);
      } else {
        // Hit but not popped — flash and shake
        b.hitFlash = 0.3;
      }
      return;
    }
  }
}

canvas.addEventListener('pointerdown', (e) => {
  e.preventDefault();
  handleTap(e.clientX, e.clientY);
});

// Draw a balloon — cartoonish style
function drawBalloon(b) {
  ctx.save();
  const rx = b.r;
  const ry = b.r * 1.25;

  // Drop shadow (soft, offset)
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.beginPath();
  ctx.ellipse(b.x + 4, b.y + 5, rx + 2, ry + 2, 0, 0, Math.PI * 2);
  ctx.fill();

  // Shake effect on hit
  let drawX = b.x;
  if (b.hitFlash > 0) {
    drawX += Math.sin(b.hitFlash * 60) * 6;
  }

  // Main balloon body with gradient
  if (b.rainbow) {
    const phase = (typeof time !== 'undefined' ? time / 800 : 0);
    const rainbowGrad = ctx.createLinearGradient(drawX - rx, b.y - ry, drawX + rx, b.y + ry);
    const rainbowColors = ['#FF0000', '#FF8800', '#FFFF00', '#00CC00', '#0066FF', '#8800FF', '#FF0000'];
    for (let i = 0; i < rainbowColors.length; i++) {
      const stop = (i / (rainbowColors.length - 1) + phase) % 1;
      rainbowGrad.addColorStop(stop, rainbowColors[i]);
    }
    // Sort stops by adding in order — re-create with sorted stops
    const sorted = [];
    for (let i = 0; i < rainbowColors.length; i++) {
      sorted.push({ stop: (i / (rainbowColors.length - 1) + phase) % 1, color: rainbowColors[i] });
    }
    sorted.sort((a, b) => a.stop - b.stop);
    const rg = ctx.createLinearGradient(drawX - rx, b.y - ry, drawX + rx, b.y + ry);
    for (const s of sorted) rg.addColorStop(s.stop, s.color);
    ctx.fillStyle = rg;
  } else {
    const bodyGrad = ctx.createRadialGradient(
      drawX - rx * 0.3, b.y - ry * 0.3, rx * 0.1,
      drawX, b.y, ry
    );
    bodyGrad.addColorStop(0, shadeColor(b.color, 60));
    bodyGrad.addColorStop(0.7, b.color);
    bodyGrad.addColorStop(1, shadeColor(b.color, -50));
    ctx.fillStyle = bodyGrad;
  }
  ctx.beginPath();
  ctx.ellipse(drawX, b.y, rx, ry, 0, 0, Math.PI * 2);
  ctx.fill();

  // Thick cartoon outline
  ctx.strokeStyle = b.rainbow ? '#AA00AA' : shadeColor(b.color, -80);
  ctx.lineWidth = b.rainbow ? 4 : 3;
  ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.ellipse(drawX, b.y, rx, ry, 0, 0, Math.PI * 2);
  ctx.stroke();

  // HP indicator for rainbow balloons
  if (b.rainbow && b.hp < 5) {
    for (let i = 0; i < b.hp; i++) {
      const dotX = drawX - (b.hp - 1) * 6 + i * 12;
      ctx.fillStyle = '#FFFFFF';
      ctx.strokeStyle = '#AA00AA';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(dotX, b.y + ry + 20, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
    }
  }

  // Big glossy shine (upper left)
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.beginPath();
  ctx.ellipse(drawX - rx * 0.28, b.y - ry * 0.32, rx * 0.35, ry * 0.38, -0.4, 0, Math.PI * 2);
  ctx.fill();

  // Small secondary shine dot
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.beginPath();
  ctx.arc(drawX - rx * 0.15, b.y - ry * 0.55, rx * 0.1, 0, Math.PI * 2);
  ctx.fill();

  // Knot at bottom — rounder, cartoon style
  const knotY = b.y + ry;
  ctx.fillStyle = b.rainbow ? '#AA00AA' : shadeColor(b.color, -30);
  ctx.strokeStyle = b.rainbow ? '#660066' : shadeColor(b.color, -80);
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(drawX - 7, knotY);
  ctx.quadraticCurveTo(drawX - 3, knotY + 5, drawX, knotY + 12);
  ctx.quadraticCurveTo(drawX + 3, knotY + 5, drawX + 7, knotY);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // Curly string
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(drawX, knotY + 12);
  const segments = 5;
  const segLen = 12;
  for (let i = 0; i < segments; i++) {
    const sy = knotY + 12 + i * segLen;
    const dir = i % 2 === 0 ? 1 : -1;
    ctx.quadraticCurveTo(drawX + dir * 10, sy + segLen * 0.5, drawX, sy + segLen);
  }
  ctx.stroke();

  ctx.restore();
}

function drawCloud(c) {
  ctx.save();
  const puffs = [
    { dx: 0,            dy: 0,            rx: c.w * 0.5,  ry: c.w * 0.22 },
    { dx: -c.w * 0.25,  dy: -c.w * 0.1,   rx: c.w * 0.35, ry: c.w * 0.2 },
    { dx: c.w * 0.22,   dy: -c.w * 0.08,  rx: c.w * 0.32, ry: c.w * 0.18 },
    { dx: -c.w * 0.1,   dy: -c.w * 0.18,  rx: c.w * 0.25, ry: c.w * 0.16 },
    { dx: c.w * 0.12,   dy: -c.w * 0.15,  rx: c.w * 0.22, ry: c.w * 0.14 },
  ];

  // Thick cartoon outline (draw each puff's outline)
  ctx.strokeStyle = 'rgba(180,200,220,0.6)';
  ctx.lineWidth = 4;
  ctx.lineJoin = 'round';
  for (const p of puffs) {
    ctx.beginPath();
    ctx.ellipse(c.x + p.dx, c.y + p.dy, p.rx, p.ry, 0, 0, Math.PI * 2);
    ctx.stroke();
  }

  // White fill with subtle gradient
  for (const p of puffs) {
    const cg = ctx.createRadialGradient(
      c.x + p.dx - p.rx * 0.2, c.y + p.dy - p.ry * 0.3, p.rx * 0.1,
      c.x + p.dx, c.y + p.dy, p.rx
    );
    cg.addColorStop(0, '#FFFFFF');
    cg.addColorStop(1, '#E8F0FA');
    ctx.fillStyle = cg;
    ctx.beginPath();
    ctx.ellipse(c.x + p.dx, c.y + p.dy, p.rx, p.ry, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // Glossy shine on top-left puff
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.beginPath();
  ctx.ellipse(c.x - c.w * 0.18, c.y - c.w * 0.18, c.w * 0.12, c.w * 0.08, -0.3, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

// Cartoon sun
function drawSun() {
  ctx.save();
  const sx = 70, sy = 80, sr = 40;

  // Rays
  ctx.strokeStyle = '#FFD700';
  ctx.lineWidth = 4;
  ctx.lineCap = 'round';
  for (let i = 0; i < 10; i++) {
    const angle = (Math.PI * 2 * i) / 10;
    const inner = sr + 8;
    const outer = sr + 22;
    ctx.beginPath();
    ctx.moveTo(sx + Math.cos(angle) * inner, sy + Math.sin(angle) * inner);
    ctx.lineTo(sx + Math.cos(angle) * outer, sy + Math.sin(angle) * outer);
    ctx.stroke();
  }

  // Sun body gradient
  const sunGrad = ctx.createRadialGradient(sx - 10, sy - 10, sr * 0.1, sx, sy, sr);
  sunGrad.addColorStop(0, '#FFF7A0');
  sunGrad.addColorStop(0.6, '#FFE034');
  sunGrad.addColorStop(1, '#FFB800');
  ctx.fillStyle = sunGrad;
  ctx.beginPath();
  ctx.arc(sx, sy, sr, 0, Math.PI * 2);
  ctx.fill();

  // Thick outline
  ctx.strokeStyle = '#E8A000';
  ctx.lineWidth = 3.5;
  ctx.beginPath();
  ctx.arc(sx, sy, sr, 0, Math.PI * 2);
  ctx.stroke();

  // Glossy shine
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.beginPath();
  ctx.ellipse(sx - 12, sy - 14, sr * 0.3, sr * 0.35, -0.3, 0, Math.PI * 2);
  ctx.fill();

  // Cute face — two eyes and a smile
  ctx.fillStyle = '#7A5C00';
  ctx.beginPath();
  ctx.arc(sx - 10, sy - 4, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(sx + 10, sy - 4, 4, 0, Math.PI * 2);
  ctx.fill();
  // Smile
  ctx.strokeStyle = '#7A5C00';
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.arc(sx, sy + 2, 14, 0.15, Math.PI - 0.15);
  ctx.stroke();

  ctx.restore();
}

// Rolling hills at the bottom
function drawHills() {
  ctx.save();
  const h = H();
  const w = W();
  const hillH = 100;

  // Back hill (darker green)
  ctx.fillStyle = '#5DBF5D';
  ctx.strokeStyle = '#3A8C3A';
  ctx.lineWidth = 3.5;
  ctx.beginPath();
  ctx.moveTo(-20, h);
  ctx.quadraticCurveTo(w * 0.15, h - hillH * 1.1, w * 0.35, h - hillH * 0.5);
  ctx.quadraticCurveTo(w * 0.55, h - hillH * 1.3, w * 0.75, h - hillH * 0.6);
  ctx.quadraticCurveTo(w * 0.9, h - hillH * 0.9, w + 20, h - hillH * 0.3);
  ctx.lineTo(w + 20, h);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // Front hill (brighter green)
  const fg = ctx.createLinearGradient(0, h - hillH, 0, h);
  fg.addColorStop(0, '#7ED957');
  fg.addColorStop(1, '#5DBF4D');
  ctx.fillStyle = fg;
  ctx.strokeStyle = '#3A8C3A';
  ctx.lineWidth = 3.5;
  ctx.beginPath();
  ctx.moveTo(-20, h);
  ctx.quadraticCurveTo(w * 0.1, h - hillH * 0.7, w * 0.28, h - hillH * 0.35);
  ctx.quadraticCurveTo(w * 0.45, h - hillH * 0.85, w * 0.6, h - hillH * 0.3);
  ctx.quadraticCurveTo(w * 0.8, h - hillH * 0.7, w + 20, h - hillH * 0.2);
  ctx.lineTo(w + 20, h);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // Little cartoon flowers on the front hill
  const flowers = [
    { x: w * 0.12, y: h - 35 },
    { x: w * 0.3,  y: h - 28 },
    { x: w * 0.52, y: h - 32 },
    { x: w * 0.7,  y: h - 25 },
    { x: w * 0.88, y: h - 22 },
  ];
  const flowerColors = ['#FF6B8A', '#FFD700', '#FF85C0', '#FFA64D', '#C77DFF'];
  for (let i = 0; i < flowers.length; i++) {
    const f = flowers[i];
    const fc = flowerColors[i];
    // Stem
    ctx.strokeStyle = '#3A8C3A';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(f.x, f.y);
    ctx.lineTo(f.x, f.y + 18);
    ctx.stroke();
    // Petals
    for (let p = 0; p < 5; p++) {
      const a = (Math.PI * 2 * p) / 5;
      ctx.fillStyle = fc;
      ctx.beginPath();
      ctx.ellipse(f.x + Math.cos(a) * 6, f.y + Math.sin(a) * 6, 5, 5, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    // Center
    ctx.fillStyle = '#FFE766';
    ctx.strokeStyle = '#CCA800';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(f.x, f.y, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
  }

  ctx.restore();
}

// Score display — cartoonish
function drawScore() {
  ctx.save();
  const cx = W() / 2;
  const cy = 42;

  // Outlined text
  ctx.font = 'bold 40px "Comic Sans MS", "Chalkboard SE", cursive, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  // Dark outline
  ctx.strokeStyle = '#2A5FA0';
  ctx.lineWidth = 5;
  ctx.lineJoin = 'round';
  ctx.strokeText(score, cx, cy);
  // White fill
  ctx.fillStyle = '#FFFFFF';
  ctx.fillText(score, cx, cy);

  // Cartoon star next to score
  const starX = cx + ctx.measureText(score.toString()).width / 2 + 24;
  // Star outline
  drawStar(starX, cy, 16, '#E8A000', 1.0, true);
  drawStar(starX, cy, 16, '#FFD700', 1.0, false);
  // Star shine
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.beginPath();
  ctx.arc(starX - 4, cy - 5, 3.5, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

// Mountains in the background
function drawMountains() {
  ctx.save();
  const h = H();
  const w = W();

  // Far mountain (lighter, bluish)
  const mg1 = ctx.createLinearGradient(0, h - 400, 0, h - 120);
  mg1.addColorStop(0, '#8EB8D8');
  mg1.addColorStop(1, '#A8D0E6');
  ctx.fillStyle = mg1;
  ctx.strokeStyle = '#6A9BBF';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(-20, h - 120);
  ctx.lineTo(w * 0.15, h - 340);
  ctx.lineTo(w * 0.3, h - 230);
  ctx.lineTo(w * 0.45, h - 400);
  ctx.lineTo(w * 0.6, h - 270);
  ctx.lineTo(w * 0.75, h - 350);
  ctx.lineTo(w * 0.9, h - 250);
  ctx.lineTo(w + 20, h - 120);
  ctx.lineTo(w + 20, h);
  ctx.lineTo(-20, h);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // Snow caps — follow mountain edges exactly
  function drawSnowCap(peakX, peakY, leftX, leftY, rightX, rightY, depth) {
    const tL = depth / (leftY - peakY);
    const tR = depth / (rightY - peakY);
    const lx = peakX + tL * (leftX - peakX);
    const rx = peakX + tR * (rightX - peakX);
    ctx.fillStyle = '#FFFFFF';
    ctx.strokeStyle = '#D0E8F5';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(lx, peakY + depth);
    ctx.lineTo(peakX, peakY);
    ctx.lineTo(rx, peakY + depth);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
  }
  drawSnowCap(w * 0.15, h - 340, -20, h - 120, w * 0.3, h - 230, 45);
  drawSnowCap(w * 0.45, h - 400, w * 0.3, h - 230, w * 0.6, h - 270, 50);
  drawSnowCap(w * 0.75, h - 350, w * 0.6, h - 270, w * 0.9, h - 250, 42);

  // Near mountain (darker, greener)
  const mg2 = ctx.createLinearGradient(0, h - 300, 0, h - 90);
  mg2.addColorStop(0, '#6BAF6B');
  mg2.addColorStop(1, '#7EC87E');
  ctx.fillStyle = mg2;
  ctx.strokeStyle = '#4A8C4A';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(-20, h - 90);
  ctx.lineTo(w * 0.1, h - 230);
  ctx.lineTo(w * 0.25, h - 170);
  ctx.lineTo(w * 0.4, h - 280);
  ctx.lineTo(w * 0.55, h - 180);
  ctx.lineTo(w * 0.7, h - 250);
  ctx.lineTo(w * 0.85, h - 200);
  ctx.lineTo(w + 20, h - 140);
  ctx.lineTo(w + 20, h);
  ctx.lineTo(-20, h);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  ctx.restore();
}

// Cartoon trees on the hills
function drawTrees(distant) {
  ctx.save();
  const h = H();
  const w = W();

  const farTrees = [
    { x: w * 0.08, y: h - 150, s: 0.7 },
    { x: w * 0.16, y: h - 130, s: 0.55 },
    { x: w * 0.28, y: h - 145, s: 0.65 },
    { x: w * 0.37, y: h - 125, s: 0.5 },
    { x: w * 0.48, y: h - 140, s: 0.6 },
    { x: w * 0.58, y: h - 130, s: 0.55 },
    { x: w * 0.67, y: h - 145, s: 0.7 },
    { x: w * 0.78, y: h - 125, s: 0.5 },
    { x: w * 0.86, y: h - 135, s: 0.6 },
    { x: w * 0.95, y: h - 120, s: 0.55 },
  ];

  const nearTrees = [
    { x: w * 0.05, y: h - 85, s: 1.6 },
    { x: w * 0.18, y: h - 70, s: 2.0 },
    { x: w * 0.38, y: h - 65, s: 1.4 },
    { x: w * 0.55, y: h - 75, s: 1.8 },
    { x: w * 0.75, y: h - 60, s: 1.5 },
    { x: w * 0.92, y: h - 55, s: 1.7 },
  ];

  const trees = distant ? farTrees : nearTrees;

  for (const t of trees) {
    const s = t.s;
    // Trunk
    ctx.fillStyle = '#8B5E3C';
    ctx.strokeStyle = '#5C3A1E';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.roundRect(t.x - 5 * s, t.y, 10 * s, 30 * s, 2);
    ctx.fill();
    ctx.stroke();

    // Three-layered cartoon canopy
    const layers = [
      { dy: -10 * s, rx: 22 * s, ry: 18 * s },
      { dy: -22 * s, rx: 18 * s, ry: 15 * s },
      { dy: -32 * s, rx: 13 * s, ry: 12 * s },
    ];
    for (const l of layers) {
      const lg = ctx.createRadialGradient(
        t.x - l.rx * 0.2, t.y + l.dy - l.ry * 0.2, l.rx * 0.1,
        t.x, t.y + l.dy, l.rx
      );
      lg.addColorStop(0, distant ? '#7ABF7A' : '#5ED35E');
      lg.addColorStop(1, distant ? '#5A9A5A' : '#3AA53A');
      ctx.fillStyle = lg;
      ctx.strokeStyle = distant ? '#4A8A4A' : '#2D7A2D';
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.ellipse(t.x, t.y + l.dy, l.rx, l.ry, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
    }

    // Shine on top layer
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.beginPath();
    ctx.ellipse(t.x - 4 * s, t.y - 36 * s, 5 * s, 4 * s, -0.3, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();
}

// Main loop
let lastTime = 0;

function gameLoop(time) {
  const dt = Math.min((time - lastTime) / 1000, 0.05);
  lastTime = time;

  // Draw sky
  drawSky();

  // Sun (behind clouds)
  drawSun();

  // Draw and update clouds
  for (const c of clouds) {
    c.x += c.speed;
    if (c.x - c.w > W()) c.x = -c.w;
    drawCloud(c);
  }

  // Background layers
  drawMountains();
  drawTrees(true);
  drawHills();
  drawTrees(false);

  // Spawn balloons
  spawnTimer += dt;
  if (spawnTimer >= spawnInterval) {
    spawnTimer -= spawnInterval;
    spawnBalloon();
  }

  // Update and draw balloons
  for (let i = balloons.length - 1; i >= 0; i--) {
    const b = balloons[i];
    b.y -= b.speed;
    b.x += Math.sin(time / 1000 * b.wobbleSpeed + b.wobbleOffset) * b.wobbleAmount * dt;
    if (b.hitFlash > 0) b.hitFlash -= dt;

    // Remove if off screen
    if (b.y + b.r * 1.2 + 50 < 0) {
      balloons.splice(i, 1);
      continue;
    }
    drawBalloon(b);
  }

  // Update and draw particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.15; // gravity
    p.life -= dt * 2.5;
    if (p.life <= 0) {
      particles.splice(i, 1);
      continue;
    }
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  drawScore();

  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);
</script>
